<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- 1000 -->
  <text x="90" y="72" text-anchor="middle" font-family="Georgia,serif"
        font-size="38" font-weight="bold" fill="white" letter-spacing="-1">1000</text>
  <!-- km -->
  <text x="90" y="108" text-anchor="middle" font-family="Georgia,serif"
        font-size="28" font-weight="bold" fill="rgba(255,255,255,0.85)">km</text>
  <!-- linea decorativa -->
  <rect x="45" y="116" width="90" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>
  <!-- gratitudine -->
  <text x="90" y="140" text-anchor="middle" font-family="Georgia,serif"
        font-size="13" fill="rgba(255,255,255,0.75)" letter-spacing="0.5">gratitudine</text>
</svg>
